name: Deploy Docs to GitHub Pages

on:
  # Jalan otomatis tiap push ke main
  push:
    branches: [main]
  # Bisa juga dijalankan manual dari tab Actions
  workflow_dispatch:

# Izin yang dibutuhkan untuk deploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya boleh ada satu deploy berjalan; biarkan yang sedang jalan selesai
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diperlukan agar lastUpdated (git) akurat

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Aktifkan Pages otomatis kalau belum di-enable di Settings
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
