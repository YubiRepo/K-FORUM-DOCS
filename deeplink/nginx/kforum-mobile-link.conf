server {
    listen 80;
    listen [::]:80;

    server_name app.k-forum.yubicom.co.id;

    # 1. Serve the Android/iOS verification files instantly.
    #    apple-app-site-association MUST have NO extension and be served as JSON.
    location /.well-known/ {
        root /var/www/kforum-mobile-link;
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # 2. Anything else opened in a real browser (PC, or user without the app):
    #    redirect to the Play Store (swap for App Store / landing page as needed).
    location / {
        return 302 https://play.google.com/store/apps/details?id=com.yubitech.k_forum;
    }
}
